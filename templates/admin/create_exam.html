{% extends "base.html" %}
{% block title %}{{ 'Edit' if exam else 'Create' }} Exam - Virtual Exam Hall{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container" style="max-width:700px;">
        <div class="page-header">
            <h1>{{ 'Edit' if exam else 'Create New' }} Exam</h1>
            <p>{{ 'Update exam details' if exam else 'Set up a new examination' }}</p>
        </div>

        <div class="glass-card">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Exam Title</label>
                    <input type="text" name="title" class="form-input" placeholder="e.g., Data Structures Mid-Term" value="{{ exam.title if exam else '' }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-input" placeholder="e.g., Computer Science" value="{{ exam.subject if exam else '' }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-textarea" placeholder="Describe the exam...">{{ exam.description if exam else '' }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" name="duration" class="form-input" min="5" max="300" value="{{ exam.duration_minutes if exam else '60' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Marks</label>
                        <input type="number" name="total_marks" class="form-input" min="1" value="{{ exam.total_marks if exam else '100' }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Passing Percentage (%)</label>
                        <input type="number" name="passing_percentage" class="form-input" min="1" max="100" value="{{ exam.passing_percentage if exam else '40' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Violations Allowed</label>
                        <input type="number" name="max_violations" class="form-input" min="1" max="20" value="{{ exam.max_violations if exam else '5' }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" style="display:flex;align-items:center;gap:.5rem;">
                        <input type="checkbox" name="proctoring_enabled" {{ 'checked' if (not exam) or exam.proctoring_enabled else '' }}>
                        Enable Proctoring
                    </label>
                </div>

                <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary btn-lg">{{ 'Update Exam' if exam else 'Create Exam' }}</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
