{% extends "base.html" %}
{% block title %}Register - Virtual Exam Hall{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join the virtual exam platform</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-input" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="student">Student</option>
                    <option value="admin">Admin / Teacher</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
